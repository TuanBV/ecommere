services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: core
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./scripts/dump-core.sql:/docker-entrypoint-initdb.d/01-core.sql:ro
      - ./database/init/02-admin-dev.sql:/docker-entrypoint-initdb.d/02-admin-dev.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:root@db:3306/core
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      MEDIA_BASE_URL: ${MEDIA_BASE_URL:-http://localhost:3001}
      UPLOAD_DIR: /app/uploads
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:3001/api
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api
volumes:
  db-data:
